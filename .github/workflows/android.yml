name: Final Recovery Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          # محاولة تشغيل البناء أينما وجد ملف gradlew
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found! Please upload your gradle files."
            exit 1
          fi
          chmod +x $GRADLEW_PATH
          $GRADLEW_PATH assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: KrtconApp
          path: "**/build/outputs/apk/debug/*.apk"
